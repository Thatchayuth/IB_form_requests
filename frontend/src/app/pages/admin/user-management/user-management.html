<!-- Admin: จัดการผู้ใช้ (Tailwind) -->
<p-toast />
<p-confirmDialog />

<div>
  <!-- Page Header -->
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
      <i class="pi pi-users text-indigo-500"></i> จัดการผู้ใช้งาน
    </h2>
  </div>

  <!-- Stats Cards -->
  @if (stats) {
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
      <div class="bg-white rounded-xl p-5 flex items-center gap-4 shadow-sm">
        <div class="w-12 h-12 rounded-xl flex items-center justify-center bg-blue-100 text-blue-500">
          <i class="pi pi-users text-xl"></i>
        </div>
        <div class="flex flex-col">
          <span class="text-2xl font-bold text-slate-800">{{ stats.total }}</span>
          <span class="text-xs text-slate-500">ผู้ใช้ทั้งหมด</span>
        </div>
      </div>
      <div class="bg-white rounded-xl p-5 flex items-center gap-4 shadow-sm">
        <div class="w-12 h-12 rounded-xl flex items-center justify-center bg-green-100 text-green-600">
          <i class="pi pi-check-circle text-xl"></i>
        </div>
        <div class="flex flex-col">
          <span class="text-2xl font-bold text-slate-800">{{ stats.active }}</span>
          <span class="text-xs text-slate-500">ใช้งานอยู่</span>
        </div>
      </div>
      <div class="bg-white rounded-xl p-5 flex items-center gap-4 shadow-sm">
        <div class="w-12 h-12 rounded-xl flex items-center justify-center bg-red-100 text-red-600">
          <i class="pi pi-ban text-xl"></i>
        </div>
        <div class="flex flex-col">
          <span class="text-2xl font-bold text-slate-800">{{ stats.inactive }}</span>
          <span class="text-xs text-slate-500">ปิดการใช้งาน</span>
        </div>
      </div>
    </div>
  }

  <!-- Search -->
  <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <div class="flex items-center gap-4">
      <input
        pInputText
        [(ngModel)]="search"
        placeholder="ค้นหาผู้ใช้... (ชื่อ, username, email)"
        (keyup.enter)="onSearch()"
        class="flex-1"
      />
      <p-button label="ค้นหา" icon="pi pi-search" (onClick)="onSearch()" />
    </div>
  </div>

  <!-- Users Table -->
  <p-table
    [value]="users"
    [loading]="loading"
    [paginator]="true"
    [rows]="limit"
    [totalRecords]="totalRecords"
    [lazy]="true"
    (onLazyLoad)="onPageChange($event)"
    [rowHover]="true"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="แสดง {first} ถึง {last} จาก {totalRecords} รายการ"
    [rowsPerPageOptions]="[10, 25, 50]"
    styleClass="p-datatable-sm"
  >
    <ng-template #header>
      <tr>
        <th>Username</th>
        <th>ชื่อ-นามสกุล</th>
        <th>อีเมล</th>
        <th>แผนก</th>
        <th style="width: 140px">บทบาท</th>
        <th style="width: 100px">สถานะ</th>
        <th style="width: 100px">จัดการ</th>
      </tr>
    </ng-template>

    <ng-template #body let-user>
      <tr>
        <td><strong>{{ user.username }}</strong></td>
        <td>{{ user.fullName }}</td>
        <td>{{ user.email || '-' }}</td>
        <td>{{ user.department || '-' }}</td>
        <td>
          <p-select
            [ngModel]="user.role"
            [options]="roleOptions"
            optionLabel="label"
            optionValue="value"
            (onChange)="changeRole(user, $event.value)"
            styleClass="w-full"
          />
        </td>
        <td>
          <p-tag
            [value]="user.isActive ? 'ใช้งาน' : 'ปิด'"
            [severity]="user.isActive ? 'success' : 'danger'"
          />
        </td>
        <td>
          <p-button
            [icon]="user.isActive ? 'pi pi-ban' : 'pi pi-check'"
            [rounded]="true"
            [text]="true"
            [severity]="user.isActive ? 'danger' : 'success'"
            [pTooltip]="user.isActive ? 'ปิดการใช้งาน' : 'เปิดการใช้งาน'"
            (onClick)="toggleActive(user)"
          />
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="7" class="text-center py-8">
          <i class="pi pi-users text-4xl text-slate-400"></i>
          <p class="text-slate-400 mt-2">ไม่พบข้อมูลผู้ใช้</p>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
