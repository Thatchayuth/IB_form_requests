<!-- รายการคำร้อง (Tailwind) -->
<div>
  <!-- Page Header -->
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
      <i class="pi pi-file text-indigo-500"></i> รายการคำร้อง
    </h2>
    <p-button
      label="สร้างคำร้องใหม่"
      icon="pi pi-plus"
      routerLink="/form-requests/create"
    />
  </div>

  <!-- Filter Bar -->
  <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <div class="flex flex-wrap items-end gap-4">
      <div class="flex-1 min-w-[180px]">
        <input
          pInputText
          [(ngModel)]="search"
          placeholder="ค้นหา... (เลขคำร้อง, หัวข้อ)"
          (keyup.enter)="onSearch()"
          class="w-full"
        />
      </div>
      <div class="flex-1 min-w-[180px]">
        <p-select
          [(ngModel)]="selectedStatus"
          [options]="statusOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="สถานะ"
          (onChange)="onSearch()"
          class="w-full"
        />
      </div>
      <div class="flex-1 min-w-[180px]">
        <p-select
          [(ngModel)]="selectedPriority"
          [options]="priorityOptions"
          optionLabel="label"
          optionValue="value"
          placeholder="ความสำคัญ"
          (onChange)="onSearch()"
          class="w-full"
        />
      </div>
      <div>
        <p-button label="ค้นหา" icon="pi pi-search" (onClick)="onSearch()" />
      </div>
    </div>
  </div>

  <!-- Data Table -->
  <p-table
    [value]="formRequests"
    [loading]="loading"
    [paginator]="true"
    [rows]="limit"
    [totalRecords]="totalRecords"
    [lazy]="true"
    (onLazyLoad)="onPageChange($event)"
    [rowHover]="true"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="แสดง {first} ถึง {last} จาก {totalRecords} รายการ"
    [rowsPerPageOptions]="[10, 25, 50]"
    styleClass="p-datatable-sm"
  >
    <ng-template #header>
      <tr>
        <th style="width: 130px">เลขคำร้อง</th>
        <th>หัวข้อ</th>
        <th style="width: 120px">ประเภท</th>
        <th style="width: 100px">ความสำคัญ</th>
        <th style="width: 120px">สถานะ</th>
        <th style="width: 130px">วันที่สร้าง</th>
        <th style="width: 100px">จัดการ</th>
      </tr>
    </ng-template>

    <ng-template #body let-item>
      <tr (dblclick)="viewDetail(item.id)" class="cursor-pointer">
        <td>
          <strong>{{ item.requestNumber }}</strong>
        </td>
        <td>{{ item.title }}</td>
        <td>{{ item.requestType }}</td>
        <td>
          <p-tag
            [value]="priorityLabels[item.priority] || item.priority"
            [severity]="getPrioritySeverity(item.priority)"
          />
        </td>
        <td>
          <p-tag
            [value]="statusLabels[item.status] || item.status"
            [severity]="getStatusSeverity(item.status)"
          />
        </td>
        <td>{{ item.createdAt | date:'dd/MM/yyyy HH:mm' }}</td>
        <td>
          <p-button
            icon="pi pi-eye"
            [rounded]="true"
            [text]="true"
            pTooltip="ดูรายละเอียด"
            (onClick)="viewDetail(item.id)"
          />
          @if (item.status === 'Draft') {
            <p-button
              icon="pi pi-pencil"
              [rounded]="true"
              [text]="true"
              severity="info"
              pTooltip="แก้ไข"
              (onClick)="editRequest(item.id)"
            />
          }
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="7" class="text-center py-8">
          <i class="pi pi-inbox text-4xl text-slate-400"></i>
          <p class="text-slate-400 mt-2">ไม่พบข้อมูลคำร้อง</p>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
