<!-- ฟอร์มสร้าง/แก้ไขคำร้อง (Tailwind) -->
<p-toast />

<div>
  <!-- Page Header -->
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
      <i class="pi pi-file-edit text-indigo-500"></i>
      {{ isEditMode ? 'แก้ไขคำร้อง' : 'สร้างคำร้องใหม่' }}
    </h2>
    <p-button
      label="กลับ"
      icon="pi pi-arrow-left"
      severity="secondary"
      [outlined]="true"
      routerLink="/form-requests"
    />
  </div>

  @if (loading) {
    <div class="flex flex-col items-center gap-4 py-12 text-slate-500">
      <i class="pi pi-spin pi-spinner text-3xl"></i>
      <p>กำลังโหลดข้อมูล...</p>
    </div>
  } @else {
    <p-card>
      <form (ngSubmit)="save()" class="grid grid-cols-1 md:grid-cols-3 gap-5">
        <!-- หัวข้อ -->
        <div class="md:col-span-3">
          <label for="title" class="block mb-2 text-sm font-semibold text-slate-600">
            <span class="text-red-500">*</span> หัวข้อคำร้อง
          </label>
          <input
            pInputText
            id="title"
            [(ngModel)]="formData.title"
            name="title"
            placeholder="กรอกหัวข้อคำร้อง"
            class="w-full"
            required
          />
        </div>

        <!-- ประเภท -->
        <div>
          <label for="type" class="block mb-2 text-sm font-semibold text-slate-600">ประเภทคำร้อง</label>
          <p-select
            id="type"
            [(ngModel)]="formData.requestType"
            name="requestType"
            [options]="typeOptions"
            optionLabel="label"
            optionValue="value"
            styleClass="w-full"
          />
        </div>

        <!-- ความสำคัญ -->
        <div>
          <label for="priority" class="block mb-2 text-sm font-semibold text-slate-600">ความสำคัญ</label>
          <p-select
            id="priority"
            [(ngModel)]="formData.priority"
            name="priority"
            [options]="priorityOptions"
            optionLabel="label"
            optionValue="value"
            styleClass="w-full"
          />
        </div>

        <!-- วันกำหนดส่ง -->
        <div>
          <label for="dueDate" class="block mb-2 text-sm font-semibold text-slate-600">วันกำหนดส่ง</label>
          <p-datepicker
            id="dueDate"
            [(ngModel)]="formData.dueDate"
            name="dueDate"
            dateFormat="dd/mm/yy"
            placeholder="เลือกวันที่"
            styleClass="w-full"
            [showIcon]="true"
          />
        </div>

        <!-- รายละเอียด -->
        <div class="md:col-span-3">
          <label for="description" class="block mb-2 text-sm font-semibold text-slate-600">
            <span class="text-red-500">*</span> รายละเอียด
          </label>
          <textarea
            pTextarea
            id="description"
            [(ngModel)]="formData.description"
            name="description"
            rows="5"
            class="w-full"
            placeholder="อธิบายรายละเอียดคำร้อง..."
            required
          ></textarea>
        </div>

        <!-- ไฟล์แนบ -->
        <div class="md:col-span-3">
          <label class="block mb-2 text-sm font-semibold text-slate-600">ไฟล์แนบ (สูงสุด 5 ไฟล์, ไม่เกิน 10MB/ไฟล์)</label>
          <p-fileUpload
            mode="advanced"
            name="files"
            [multiple]="true"
            [maxFileSize]="10485760"
            [fileLimit]="5"
            [auto]="false"
            [showUploadButton]="false"
            chooseLabel="เลือกไฟล์"
            (onSelect)="onFileSelect($event)"
          >
            <ng-template #empty>
              <p class="text-center text-slate-400">ลากไฟล์มาวางที่นี่ หรือกดเลือกไฟล์</p>
            </ng-template>
          </p-fileUpload>
        </div>

        <!-- Actions -->
        <div class="md:col-span-3 flex justify-end gap-3 pt-4 border-t border-slate-200">
          <p-button
            label="ยกเลิก"
            severity="secondary"
            [outlined]="true"
            routerLink="/form-requests"
          />
          <p-button
            type="submit"
            [label]="isEditMode ? 'บันทึกการแก้ไข' : 'สร้างคำร้อง'"
            icon="pi pi-save"
            [loading]="saving"
          />
        </div>
      </form>
    </p-card>
  }
</div>
