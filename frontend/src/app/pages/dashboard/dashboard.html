<!-- Dashboard — แดชบอร์ดระบบจัดการคำร้อง (Tailwind) -->
<div>
  <!-- Page Header -->
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
      <i class="pi pi-home text-indigo-500"></i>
      แดชบอร์ด
    </h2>
    <span class="text-slate-500 text-sm">
      สวัสดี, {{ auth.currentUser()?.fullName }}
    </span>
  </div>

  <!-- Stat Cards -->
  <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 mb-6">
    @for (card of statCards; track card.label) {
      <div class="bg-white rounded-xl p-5 flex items-center gap-4 shadow-sm hover:-translate-y-0.5 transition-transform">
        <div
          class="w-12 h-12 rounded-xl flex items-center justify-center"
          [style.background]="card.color + '15'"
          [style.color]="card.color"
        >
          <i [ngClass]="card.icon" class="text-xl"></i>
        </div>
        <div class="flex flex-col">
          <span class="text-2xl font-bold text-slate-800">{{ card.value }}</span>
          <span class="text-xs text-slate-500">{{ card.label }}</span>
        </div>
      </div>
    }
  </div>

  <!-- Charts -->
  @if (stats) {
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <p-card header="คำร้องตามสถานะ" styleClass="chart-card">
        @if (statusChartData) {
          <p-chart type="doughnut" [data]="statusChartData" [options]="chartOptions" />
        }
      </p-card>

      <p-card header="คำร้องตามความสำคัญ" styleClass="chart-card">
        @if (priorityChartData) {
          <p-chart type="pie" [data]="priorityChartData" [options]="chartOptions" />
        }
      </p-card>
    </div>
  }

  <!-- Loading -->
  @if (loading) {
    <div class="flex flex-col items-center gap-4 py-12 text-slate-500">
      <i class="pi pi-spin pi-spinner text-3xl"></i>
      <p>กำลังโหลดข้อมูล...</p>
    </div>
  }
</div>
