<!-- Layout: Sidebar + Header + Content — Tailwind + Kanit -->
<p-toast />

<div class="flex min-h-screen">
  <!-- ─── Backdrop (mobile only) ───────────────────── -->
  @if (mobileOpen) {
    <div
      class="fixed inset-0 z-40 bg-black/50 md:hidden"
      (click)="closeMobile()"
    ></div>
  }

  <!-- ─── Sidebar ──────────────────────────────────── -->
  <aside
    class="fixed inset-y-0 left-0 z-50 flex flex-col bg-sidebar text-slate-300 transition-all duration-300 ease-in-out overflow-hidden"
    [class.w-16]="sidebarCollapsed"
    [class.w-64]="!sidebarCollapsed"
    [class.mobile-open]="mobileOpen"
  >
    <!-- Logo -->
    <div class="flex h-15 items-center border-b border-slate-700 px-4 shrink-0">
      @if (!sidebarCollapsed) {
        <span class="flex items-center gap-3">
          <img src="logo.png" alt="JNTCRZ" class="h-8" style="filter: brightness(0) invert(1)" />
        </span>
      } @else {
        <span class="flex w-full justify-center">
          <img src="logo.png" alt="JNTCRZ" class="h-6" style="filter: brightness(0) invert(1)" />
        </span>
      }
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto py-2">
      @for (item of menuItems; track item.routerLink) {
        <a
          [routerLink]="item.routerLink"
          routerLinkActive="!bg-sidebar-active !text-white !border-l-blue-500"
          [routerLinkActiveOptions]="{ exact: item.routerLink === '/' }"
          class="flex items-center gap-3 px-4 py-3 text-slate-400 border-l-3 border-transparent hover:bg-sidebar-hover hover:text-slate-200 transition-colors cursor-pointer"
          [class.justify-center]="sidebarCollapsed"
          [class.px-3]="sidebarCollapsed"
        >
          <i class="text-lg min-w-5 text-center" [ngClass]="item.icon"></i>
          @if (!sidebarCollapsed) {
            <span class="whitespace-nowrap overflow-hidden">{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <!-- Footer -->
    <div class="border-t border-slate-700 py-2 shrink-0">
      <a
        (click)="logout()"
        class="flex items-center gap-3 px-4 py-3 text-slate-400 border-l-3 border-transparent hover:bg-sidebar-hover hover:text-slate-200 transition-colors cursor-pointer"
        [class.justify-center]="sidebarCollapsed"
        [class.px-3]="sidebarCollapsed"
      >
        <i class="pi pi-sign-out text-lg min-w-5 text-center"></i>
        @if (!sidebarCollapsed) {
          <span class="whitespace-nowrap overflow-hidden">ออกจากระบบ</span>
        }
      </a>
    </div>
  </aside>

  <!-- ─── Main Content ─────────────────────────────── -->
  <div
    class="flex-1 flex flex-col min-h-screen transition-all duration-300"
    [class.ml-16]="sidebarCollapsed"
    [class.ml-64]="!sidebarCollapsed"
  >
    <!-- Header -->
    <header class="sticky top-0 z-40 h-15 flex items-center justify-between bg-white border-b border-slate-200 px-6 shadow-sm">
      <div class="flex items-center gap-3">
        <button
          pButton
          icon="pi pi-bars"
          class="p-button-text p-button-rounded"
          (click)="toggleSidebar()"
          pTooltip="Toggle Sidebar"
        ></button>
        <img src="logo.png" alt="JNTCRZ" class="h-7 hidden sm:block" />
      </div>

      <div class="flex items-center gap-3">
        <!-- แผงแจ้งเตือน -->
        <app-notification-panel />

        <!-- ข้อมูลผู้ใช้ -->
        <div class="flex flex-col items-end mx-2">
          <span class="text-sm font-semibold text-slate-800">{{ auth.currentUser()?.fullName }}</span>
          <span class="text-xs text-slate-500 uppercase">{{ auth.isAdmin() ? 'ผู้ดูแลระบบ' : 'ผู้ใช้งาน' }}</span>
        </div>

        <button
          pButton
          icon="pi pi-sign-out"
          class="p-button-text p-button-rounded p-button-danger"
          (click)="logout()"
          pTooltip="ออกจากระบบ"
        ></button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 p-6 bg-slate-50">
      <router-outlet />
    </main>
  </div>
</div>
